name: Submit Threat Intelligence
description: Report a new vulnerability, prompt injection technique, or jailbreak vector in the AI ecosystem.
title: "[THREAT]: "
labels: ["threat-intel"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the Prismor Agent Immunity feed! Please fill out this form as completely as possible. This information must align with our JSON schema (`threat-object.schema.json`) so it can be merged into the autoimmune system feed.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: The evaluated risk level based on potential blast radius.
      options:
        - critical
        - high
        - medium
        - low
        - unknown
    validations:
      required: true
      
  - type: dropdown
    id: type
    attributes:
      label: Threat Category
      description: What kind of behavioral anomaly or vector does this represent?
      options:
        - prompt_injection
        - data_exfiltration
        - unsafe_tool_execution
        - jailbreak
        - policy_bypass
        - dependency_vulnerability
        - model_denial_of_service
        - unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed Description
      description: Provide a detailed explanation of the attack vector, prerequisites to execute the attack, and the potential impact.
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Affected Frameworks/Components (CPE Format)
      description: What specific AI packages, tools, or frameworks are vulnerable? (e.g., `langchain-experimental<=0.0.50` or `openai-python<1.0`). Put each affected component on a new line.
      placeholder: |
        example-agent-framework<=2.1.0
        another-library==1.0.5
    validations:
      required: true

  - type: textarea
    id: action
    attributes:
      label: Prescribed Immune Action
      description: How should an agent developer remediate this? (e.g., "Upgrade to version X," "Wrap arbitrary file reading in a secure container," "Apply specific guardrails").
    validations:
      required: true

  - type: input
    id: reference
    attributes:
      label: Reference Link
      description: A URL to a CVE, Proof of Concept (PoC) blog post, or PR detailing the fix (if applicable).
      placeholder: https://github.com/advisories/...
    validations:
      required: false
