name: Process Community Intel (Stub)

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  process-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'threat-intel')
    steps:
      - name: Acknowledge Intelligence Submission
        run: |
            echo "A community member has submitted a threat intelligence report via the threat-intel.yml template."
            echo "Issue title: ${{ github.event.issue.title }}"
            echo "Action Required: A core maintainer must review this issue, validate the schema fields, and merge it via a PR to advisories/immunity-feed.json."
