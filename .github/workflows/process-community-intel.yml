    types: [opened, edited]
  workflow_dispatch:

jobs:
  process-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'threat-intel')
    steps:
      - name: Acknowledge Intelligence Submission
        run: |
            echo "This workflow will eventually parse community-submitted GitHub Issues tagged with 'threat-intel', format them into the Prismorsec Threat Object Schema, and open a PR against the advisories/immunity-feed.json file."
            echo "Issue title: ${{ github.event.issue.title }}"
