name: NVD Intel Polling and Fusion

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  poll-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure a full clone if we need to commit back with history
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and Merge NVD Intel
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          # Fetch writes to stdout, merge reads from stdin
          python scripts/fetch_nvd_intel.py | python scripts/merge_intel.py

      - name: Sign the Feed
        env:
          PRISMOR_SIGNING_PRIVATE_KEY: ${{ secrets.PRISMOR_SIGNING_PRIVATE_KEY }}
        run: |
          chmod +x scripts/sign_feed.sh
          bash scripts/sign_feed.sh

      - name: Check for Changes
        id: check_changes
        run: |
          if [[ -z $(git status --porcelain advisories/) ]]; then
            echo "No changes in advisories directory."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Detected changes in advisories."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "Prismor Bot"
          git config --global user.email "contact@prismor.dev"
          git add advisories/immunity-feed.json advisories/immunity-feed.json.sig
          git commit -m "Automated update: NVD Threat Intelligence fetched and signed"
          git push
