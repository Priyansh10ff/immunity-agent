version: "1.0"

# Default Prismor Warden policy
# All rules from the built-in detection engine, now configurable.
#
# Override per-project: create .prismor-warden/policy.yaml in your workspace.
# Only rules you define there will override — the rest fall back to defaults.

settings:
  # Categories that trigger a blocking verdict in enforce mode.
  # Override in .prismor-warden/policy.yaml to add or remove categories.
  block_categories:
    - destructive_command
    - secret_exfiltration
    - secret_access
    - remote_execution
    - prompt_injection
    - dos_resource_exhaustion
    - rce_canary
    - db_modification
    - privilege_escalation
    - skill_risk

  # Regex patterns used to identify dependency manifest files.
  # Matched paths cause risky_write findings to be upgraded to HIGH severity.
  manifest_patterns:
    - 'package(-lock)?\.json$|pnpm-lock\.yaml$|yarn\.lock$'
    - 'requirements.*\.txt$|pyproject\.toml$|Pipfile$'
    - 'Gemfile$'
    - 'go\.mod$'
    - 'Cargo\.toml$'
    - 'pom\.xml$|build\.gradle(\.kts)?$'

rules:
  # ── CRITICAL: Destructive commands ────────────────────────────────────
  - id: destructive-command
    severity: CRITICAL
    category: destructive_command
    title: Blocks rm -rf /, mkfs, dd to disk, shutdown, reboot
    event_types: [shell]
    fields: [command]
    patterns:
      - 'rm\s+(?:-[a-zA-Z]*f[a-zA-Z]*\s+|(?:-[a-zA-Z]+\s+)*)(?:/\s*$|/\s+|/\S*\*)'
      - 'rm\s+-[a-zA-Z]*r[a-zA-Z]*f\b|rm\s+-[a-zA-Z]*f[a-zA-Z]*r\b'
      - 'sudo\s+rm\b'
      - 'chmod\s+777\b'
      - 'chown\s+-R\b'
      - 'mkfs\b'
      - 'dd\s+if=.*of=/dev/'
      - 'shutdown\b'
      - 'reboot\b'
      - 'launchctl\s+unload\b'
    action: block

  # ── CRITICAL: Secret exfiltration ─────────────────────────────────────
  - id: secret-exfiltration
    severity: CRITICAL
    category: secret_exfiltration
    title: Blocks cat .env | curl, piping secrets to external hosts
    event_types: [shell]
    fields: [command]
    patterns:
      - '\b(cat|sed|grep|awk)\b[^\n]*(\.env|id_rsa|id_ed25519|\.npmrc|\.pypirc|\.aws|\.ssh)[^\n]*(curl|wget|nc|scp|ftp|http)'
    action: block

  # ── CRITICAL: DoS / resource exhaustion ───────────────────────────────
  - id: dos-resource-exhaustion
    severity: CRITICAL
    category: dos_resource_exhaustion
    title: Blocks fork bombs, while-true loops, /dev/urandom abuse
    event_types: [shell]
    fields: [command]
    patterns:
      - ':\(\)\s*\{.*\|.*&\s*\}\s*;'
      - 'while\s+true\s*;?\s*do\b'
      - 'yes\s*\|'
      - 'dd\s+if=/dev/(zero|urandom)\b'
      - 'cat\s+/dev/urandom\b'
      - '\b(stress|stress-ng)\b'
      - 'ulimit\s+-[a-z]+\s+unlimited'
    action: block

  # ── CRITICAL: RCE / reverse shell canaries ────────────────────────────
  - id: rce-canary
    severity: CRITICAL
    category: rce_canary
    title: Blocks reverse shells, bash -i /dev/tcp, crontab injection
    event_types: [shell]
    fields: [command]
    patterns:
      - 'bash\s+-i\s+>&\s*/dev/tcp/'
      - '/dev/tcp/\d'
      - 'nc\s+.*-[a-z]*l[a-z]*\s*.*-p'
      - 'python3?\s+-c\s+.*(?:exec|eval|import\s+os)'
      - 'perl\s+-e\s+.*(?:socket|exec)'
      - 'echo\s+.*\|\s*crontab'
      - '\*\s+\*\s+\*\s+\*\s+\*.*crontab'
      - '\b(ncat|socat)\b.*(?:exec|listen|EXEC)'
      - 'mkfifo\s+.*\bsh\b'
    action: block

  # ── CRITICAL: Privilege escalation ────────────────────────────────────
  - id: privilege-escalation
    severity: CRITICAL
    category: privilege_escalation
    title: Blocks chmod +s, sudoers edits, useradd, setcap
    event_types: [shell]
    fields: [command]
    patterns:
      - 'chmod\s+[ugo+]*s\s'
      - 'chmod\s+[0-7]*[4-7][0-7]{2}[0-7]\s'
      - '\bsetcap\b'
      - '\bvisudo\b|/etc/sudoers'
      - 'usermod\s+.*-[a-zA-Z]*G\s+.*sudo'
      - '\b(useradd|adduser)\b'
      - '\bnsenter\b'
      - '\bpkexec\b'
      - 'chattr\s+\+i\b'
    action: block

  # ── HIGH: Prompt injection ────────────────────────────────────────────
  - id: prompt-injection
    severity: HIGH
    category: prompt_injection
    title: Detects 'ignore instructions', 'reveal system prompt' in agent I/O
    event_types: [prompt, tool_result]
    fields: [combined_text]
    patterns:
      - '(ignore\s+(all\s+)?(any\s+)?(previous\s+)?instructions|reveal (your|the) system prompt|developer instructions|exfiltrat(e|ion)|print .*secret|show .*token|bypass guardrails|jailbreak)'
    action: block

  # ── HIGH: Remote fetch-and-execute ────────────────────────────────────
  - id: remote-execution
    severity: HIGH
    category: remote_execution
    title: Blocks curl | bash, wget | sh fetch-and-execute chains
    event_types: [shell]
    fields: [command]
    patterns:
      - '\b(curl|wget)\b[^|;\n]*\|\s*(bash|sh)\b'
    action: block

  # ── HIGH: Sensitive file access ───────────────────────────────────────
  - id: secret-access
    severity: HIGH
    severity_on_write: CRITICAL
    category: secret_access
    title: Flags reads/writes to .env, .ssh/id_rsa, .aws/credentials
    event_types: [file_read, file_write]
    fields: [path]
    patterns:
      - '(^|/)(\.env(\..*)?|\.npmrc|\.pypirc|id_rsa|id_ed25519|known_hosts|authorized_keys|credentials|config\.json|secrets?)(/|$)|(^|/)\.(aws|ssh|gnupg)(/|$)'
    action: block

  # ── HIGH: Suspicious network destinations ─────────────────────────────
  - id: suspicious-network
    severity: HIGH
    category: secret_exfiltration
    title: Flags calls to webhook.site, ngrok, pastebin, Discord webhooks
    event_types: [network]
    fields: [url]
    patterns:
      - '(webhook\.site|ngrok-free\.app|ngrok\.io|pastebin\.com|discord(app)?\.com/api/webhooks|transfer\.sh)'
    action: block

  # ── HIGH: Database modification ───────────────────────────────────────
  - id: db-modification
    severity: HIGH
    category: db_modification
    title: Flags DROP TABLE, DELETE FROM, TRUNCATE in shell commands
    event_types: [shell]
    fields: [command]
    patterns:
      - '\b(DROP\s+(TABLE|DATABASE)|TRUNCATE\s+TABLE|DELETE\s+FROM|UPDATE\s+\w+\s+SET|ALTER\s+TABLE|INSERT\s+INTO)\b'
      - '(?:mysql|psql|sqlite3)\s+.*(?:-e\s+|-c\s+)[''"]?\s*(?:DROP|DELETE|UPDATE|ALTER|INSERT|TRUNCATE)'
    action: block

  # ── HIGH: Database dumps / sensitive queries ──────────────────────────
  - id: db-access
    severity: HIGH
    category: db_access
    title: Flags pg_dump, mysqldump, SELECT FROM users/passwords/tokens
    event_types: [shell]
    fields: [command]
    patterns:
      - '\b(pg_dump|mysqldump|mongodump|redis-cli\s+--rdb)\b'
      - 'sqlite3\s+.*\.dump'
      - '\bSELECT\b[^;]*\bFROM\b[^;]*\b(users?|accounts?|credentials?|passwords?|secrets?|tokens?|sessions?|admins?)\b'
      - '\bCOPY\b.*\bTO\b\s+[''"'']'
    action: warn

  # ── HIGH: Path traversal ──────────────────────────────────────────────
  - id: path-traversal
    severity: HIGH
    category: path_traversal
    title: Flags ../../ traversal, reads of /etc/passwd, /proc/self/environ
    event_types: [shell, file_read]
    fields: [command, path]
    patterns:
      - '(\.\./){2,}'
      - '/etc/(passwd|shadow|hosts|sudoers)'
      - '/proc/self/(environ|cmdline|maps|root)'
      - '/proc/\d+/(environ|cmdline|maps)'
    action: warn

  # ── MEDIUM-HIGH: High-risk file writes ────────────────────────────────
  - id: risky-write
    severity: MEDIUM
    severity_on_manifest: HIGH
    category: risky_write
    title: Flags writes to Dockerfile, CI workflows, package.json, go.mod
    event_types: [file_write]
    fields: [path]
    patterns:
      - '(^|/)(\.github/workflows/.+\.(yml|yaml)|Dockerfile|docker-compose\.ya?ml|package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|requirements.*\.txt|pyproject\.toml|Pipfile|Gemfile|go\.mod|Cargo\.toml|pom\.xml|build\.gradle(\.kts)?|terraform\.tfvars|\.env(\..*)?)$'
    action: warn

  # ── CRITICAL: Skill exfiltration URLs ──────────────────────────────
  - id: skill-exfil-url
    severity: CRITICAL
    category: skill_risk
    title: Skill references known exfiltration endpoint
    event_types: [skill_manifest]
    fields: [combined_text]
    patterns:
      - 'webhook\.site|ngrok-free\.app|ngrok\.io|requestbin|pipedream'
      - 'pastebin\.com|discord(app)?\.com/api/webhooks|transfer\.sh'
      - 'hookbin\.com|burpcollaborator|interact\.sh|oast\.'
    action: block

  # ── CRITICAL: Encoded payloads in skills ──────────────────────────
  - id: skill-encoded-payload
    severity: CRITICAL
    category: skill_risk
    title: Skill contains base64/hex encoded payload
    event_types: [skill_manifest]
    fields: [combined_text]
    patterns:
      - 'base64\s*-?d'
      - '\\x[0-9a-fA-F]{20,}'
      - 'eval\(atob\('
      - 'fromCharCode\(\d+,\d+,\d+'
    action: block

  # ── CRITICAL: Shell injection via skill config ────────────────────
  - id: skill-shell-injection
    severity: CRITICAL
    category: skill_risk
    title: Skill injects shell commands in config or prompts
    event_types: [skill_manifest]
    fields: [combined_text]
    patterns:
      - '\b(curl|wget)\b[^|;\n]*\|\s*(bash|sh|python)\b'
      - '\$\(.*\)|`[^`]+`'
      - '\bsubprocess\b|\bos\.system\b|\bchild_process\b'
      - '\bexec\s*\(|\beval\s*\('
    action: block

  # ── HIGH: Prompt override attempt in skill ────────────────────────
  - id: skill-prompt-override
    severity: HIGH
    category: skill_risk
    title: Skill attempts to override system instructions
    event_types: [skill_manifest]
    fields: [combined_text]
    patterns:
      - 'ignore\s+(all\s+)?(any\s+)?(previous|prior|above)\s+instructions'
      - 'you\s+are\s+now|new\s+persona|act\s+as\s+if'
      - 'disregard.*system\s*prompt'
      - 'forget\s+(everything|all|your)\s+(previous|prior|instructions)'
    action: block

  # ── HIGH: Skill references sensitive file paths ───────────────────
  - id: skill-secret-access
    severity: HIGH
    category: skill_risk
    title: Skill references sensitive credential paths
    event_types: [skill_manifest]
    fields: [combined_text]
    patterns:
      - '(^|/)\.env(\.|/|$)|\.ssh/id_(rsa|ed25519)|\.aws/credentials'
      - '\.npmrc|\.pypirc|\.docker/config\.json'
      - '/etc/(passwd|shadow|sudoers)'
    action: block

  # ── MEDIUM: Overly broad permissions ──────────────────────────────
  - id: skill-overpermission
    severity: MEDIUM
    category: skill_risk
    title: Skill requests broad filesystem or network access
    event_types: [skill_manifest]
    fields: [combined_text]
    patterns:
      - '"allowedPaths"\s*:\s*\[\s*"[/*]"'
      - '"allowedDomains"\s*:\s*\[\s*"\*"'
      - '"permissions"\s*:\s*\[\s*"\*"'
    action: warn

allowlists: []
